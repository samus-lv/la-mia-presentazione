<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Capolavoro interattivo - La mia presentazione</title>
    <style>
        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9eef5 100%);
            color: #1e2a3a;
            margin: 0;
            min-height: 100vh;
            padding: 2rem;
        }

        /* Layout principale */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Menu a tendina in alto a sinistra */
        .dropdown {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .dropbtn {
            background-color: #2c3e50;
            color: white;
            padding: 12px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        .dropbtn:hover {
            background-color: #e67e22;
            transform: scale(1.02);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 55px;
            left: 0;
            background-color: #fef9e8;
            min-width: 220px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 10px 0;
            z-index: 1001;
        }

        .dropdown-content button {
            display: block;
            width: 100%;
            background: none;
            border: none;
            text-align: left;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            color: #2c3e50;
        }

        .dropdown-content button:hover {
            background-color: #ffd966;
        }

        .show {
            display: block;
        }

        /* Griglia titoli + drop zone */
        .grid-titoli {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            margin-top: 80px; /* spazio per il menu fisso */
            margin-bottom: 3rem;
        }

        .card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 1rem;
            width: 280px;
            min-height: 280px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .card h2 {
            text-align: center;
            border-bottom: 3px solid #e67e22;
            display: inline-block;
            width: 100%;
            padding-bottom: 8px;
        }

        .drop-zone {
            background: #f0f3f8;
            border: 2px dashed #aaa;
            border-radius: 24px;
            min-height: 150px;
            margin-top: 20px;
            padding: 12px;
            transition: background 0.2s;
        }

        .drop-zone.drag-over {
            background: #ffe0b5;
            border-color: #e67e22;
        }

        /* Descrizioni trascinabili (inizialmente mescolate) */
        .drag-area {
            background: #fffaf0;
            border-radius: 32px;
            padding: 1.5rem;
            margin-top: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .draggable {
            background: #ffecd6;
            border-left: 8px solid #e67e22;
            padding: 16px;
            width: 240px;
            border-radius: 20px;
            cursor: grab;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.1s;
        }
        .draggable:active {
            cursor: grabbing;
        }
        .draggable.dragging {
            opacity: 0.5;
        }

        /* Messaggio di completamento */
        .completion {
            text-align: center;
            margin-top: 30px;
            font-weight: bold;
            background: #2ecc71;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        /* Effetti dinamici via JS */
        .effect-rotate {
            transform: rotate(2deg);
        }
        .effect-invert {
            filter: invert(1);
        }
        .effect-zoom {
            transform: scale(0.98);
        }
        .effect-blur {
            filter: blur(1px);
        }
    </style>
</head>
<body>
<div class="container">
    <!-- MENU A TENDINA -->
    <div class="dropdown">
        <button class="dropbtn" id="menuBtn">🎨 Cambia stile ▼</button>
        <div class="dropdown-content" id="myDropdown">
            <button id="styleDefault">✨ Stile normale</button>
            <button id="styleDark">🌙 Scuro (sfondo nero, testo chiaro)</button>
            <button id="styleFontMono">📝 Font monospace</button>
            <button id="styleRotate">🔄 Rotea la pagina (2°)</button>
            <button id="styleInvert">🌈 Inverti colori</button>
            <button id="styleCrazy">🤪 Effetto zoom + blur</button>
        </div>
    </div>

    <!-- TRE TITOLI CON ZONE DROP -->
    <div class="grid-titoli" id="gridTitoli">
        <div class="card" data-titolo="chi-sono">
            <h2>📌 Chi sono</h2>
            <div class="drop-zone" data-target="chi-sono"></div>
        </div>
        <div class="card" data-titolo="dove-studio">
            <h2>🎓 Dove studio</h2>
            <div class="drop-zone" data-target="dove-studio"></div>
        </div>
        <div class="card" data-titolo="esperienze">
            <h2>💼 Esperienze lavorative</h2>
            <div class="drop-zone" data-target="esperienze"></div>
        </div>
    </div>

    <!-- AREA CON LE DESCRIZIONI TRASCINABILI (MESCOLATE ALL'INIZIO) -->
    <h3 style="text-align:center;">✋ Trascina ogni descrizione sotto il titolo giusto ✋</h3>
    <div class="drag-area" id="dragArea"></div>

    <div id="completionMsg" style="text-align:center;"></div>
    <footer>Trascina i riquadri con il mouse nelle aree tratteggiate. Divertiti con gli stili!</footer>
</div>

<script>
    // ---- DATI DELLE DESCRIZIONI ----
const descrizioniRaw = [
    { id: "desc-chi", testo: "Sono Samuele, studente di informatica appassionato di sviluppo web. Adoro trasformare idee in codice.", targetCorretto: "chi-sono" },
    { id: "desc-studio", testo: "Studio Informatica e Telecomunicazioni all'ITIS Mattei di Urbino, con focus su programmazione web e reti.", targetCorretto: "dove-studio" },
    { id: "desc-lavoro", testo: "Ho fatto un tirocinio da FB Balzanelli S.p.A. come sviluppatore web junior, lavorando su pagine web e integrazione software in team.", targetCorretto: "esperienze" }
];

    // Mescola l'ordine iniziale delle descrizioni
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    let descrizioni = shuffleArray([...descrizioniRaw]);
    let descrizioniPosizionate = { "chi-sono": null, "dove-studio": null, "esperienze": null };
    // Per tenere traccia di quali descrizioni sono già state droppate (vengono rimosse dalla dragArea)

    // Funzione per disegnare l'area di trascinamento con le descrizioni ancora da abbinare
    function renderDragArea() {
        const dragArea = document.getElementById('dragArea');
        dragArea.innerHTML = '';
        descrizioni.forEach(desc => {
            const div = document.createElement('div');
            div.className = 'draggable';
            div.setAttribute('draggable', 'true');
            div.setAttribute('data-id', desc.id);
            div.setAttribute('data-target-corretto', desc.targetCorretto);
            div.textContent = desc.testo;
            // eventi drag
            div.addEventListener('dragstart', handleDragStart);
            div.addEventListener('dragend', handleDragEnd);
            dragArea.appendChild(div);
        });
    }

    let draggedItem = null;

    function handleDragStart(e) {
        draggedItem = this;
        e.dataTransfer.setData('text/plain', this.getAttribute('data-id'));
        this.classList.add('dragging');
    }

    function handleDragEnd(e) {
        if (draggedItem) draggedItem.classList.remove('dragging');
        draggedItem = null;
        // rimuovo highlight da tutte le drop zone
        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.classList.remove('drag-over');
        });
    }

    // Setup drop zone
    function setupDropZones() {
        const dropZones = document.querySelectorAll('.drop-zone');
        dropZones.forEach(zone => {
            zone.addEventListener('dragover', (e) => {
                e.preventDefault(); // necessario per drop
                zone.classList.add('drag-over');
            });
            zone.addEventListener('dragleave', () => {
                zone.classList.remove('drag-over');
            });
            zone.addEventListener('drop', (e) => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                if (!draggedItem) return;

                const targetZone = zone.parentElement.querySelector('.drop-zone'); // la zona stessa
                const targetCard = zone.closest('.card');
                const targetKey = targetCard.getAttribute('data-titolo'); // "chi-sono", "dove-studio", "esperienze"
                const descId = draggedItem.getAttribute('data-id');
                const descCorretto = draggedItem.getAttribute('data-target-corretto');

                // troviamo l'oggetto descrizione corrispondente
                const descObj = descrizioni.find(d => d.id === descId);
                if (!descObj) return;

                // Verifica se la descrizione è già stata posizionata in qualche altra zona (preveniamo duplicati)
                if (descrizioniPosizionate[targetKey] === descObj.id) {
                    // già presente, non fare nulla
                    return;
                }
                // Controlla se questa descrizione è già stata droppata altrove
                let giàPosizionata = false;
                for (let key in descrizioniPosizionate) {
                    if (descrizioniPosizionate[key] === descObj.id) {
                        giàPosizionata = true;
                        break;
                    }
                }
                if (giàPosizionata) {
                    alert("Questa descrizione è già stata abbinata! Per spostarla, resetta la pagina o trascinala dove non c'è niente? (puoi ricaricare la pagina per ricominciare)");
                    return;
                }

                // Se la descrizione è corretta per questo target? (opzionale: permettere anche abbinamenti sbagliati? ma il gioco è abbinare giusto)
                if (descCorretto !== targetKey) {
                    alert("❌ Abbinamento sbagliato! Questa descrizione non corrisponde a questo titolo. Prova con un altro.");
                    return;
                }

                // Abbinamento corretto: sposta la descrizione nella drop zone
                const dropZoneDiv = zone;
                // Creiamo un elemento visivo della descrizione dentro la drop zone
                const insertedDiv = document.createElement('div');
                insertedDiv.className = 'dropped-card';
                insertedDiv.style.background = '#d4edda';
                insertedDiv.style.padding = '12px';
                insertedDiv.style.borderRadius = '16px';
                insertedDiv.style.margin = '8px 0';
                insertedDiv.style.borderLeft = '4px solid #27ae60';
                insertedDiv.textContent = descObj.testo;
                // Aggiungo anche un piccolo pulsante per rimuovere? opzionale per permettere correzioni
                const removeBtn = document.createElement('button');
                removeBtn.textContent = '✖️';
                removeBtn.style.float = 'right';
                removeBtn.style.background = 'none';
                removeBtn.style.border = 'none';
                removeBtn.style.cursor = 'pointer';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    // Rimuove questa descrizione dalla drop zone e la riaggiunge nell'area drag
                    insertedDiv.remove();
                    descrizioniPosizionate[targetKey] = null;
                    // Rimettiamo la descrizione nell'array delle non posizionate
                    descrizioni.push(descObj);
                    renderDragArea();
                    checkCompletion();
                };
                insertedDiv.appendChild(removeBtn);
                dropZoneDiv.innerHTML = ''; // pulisce (se vogliamo una sola descrizione per zona)
                dropZoneDiv.appendChild(insertedDiv);

                // Aggiorniamo lo stato
                descrizioniPosizionate[targetKey] = descObj.id;
                // Rimuoviamo la descrizione dall'area trascinabile
                const index = descrizioni.findIndex(d => d.id === descObj.id);
                if (index !== -1) descrizioni.splice(index, 1);
                renderDragArea();
                checkCompletion();
            });
        });
    }

    function checkCompletion() {
        const allFilled = descrizioniPosizionate["chi-sono"] && descrizioniPosizionate["dove-studio"] && descrizioniPosizionate["esperienze"];
        const msgDiv = document.getElementById('completionMsg');
        if (allFilled && descrizioni.length === 0) {
            msgDiv.innerHTML = '<div class="completion">🎉 COMPLIMENTI! Hai sistemato tutte le descrizioni correttamente! 🎉</div>';
        } else {
            msgDiv.innerHTML = '';
        }
    }

    // ------ MENU A TENDINA (gestione apertura/chiusura) ------
    const menuBtn = document.getElementById('menuBtn');
    const dropdown = document.getElementById('myDropdown');
    menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('show');
    });
    window.addEventListener('click', (e) => {
        if (!dropdown.contains(e.target) && e.target !== menuBtn) {
            dropdown.classList.remove('show');
        }
    });

    // ------ FUNZIONI DI STILE DIVERTENTI ------
    const body = document.body;
    // resetta tutti gli effetti rimuovendo classi e stili inline extra
    function resetStyles() {
        body.style.backgroundColor = '';
        body.style.color = '';
        body.style.fontFamily = '';
        body.style.transform = '';
        body.style.filter = '';
        body.classList.remove('effect-rotate', 'effect-invert', 'effect-zoom', 'effect-blur');
        // ripristina anche eventuali stili diretti
        body.style.background = '';
    }

    document.getElementById('styleDefault').addEventListener('click', () => {
        resetStyles();
        body.style.background = "linear-gradient(135deg, #f5f7fa 0%, #e9eef5 100%)";
        body.style.color = "#1e2a3a";
        body.style.fontFamily = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
        dropdown.classList.remove('show');
    });
    document.getElementById('styleDark').addEventListener('click', () => {
        resetStyles();
        body.style.backgroundColor = "#121212";
        body.style.color = "#f0f0f0";
        body.style.background = "#121212";
        dropdown.classList.remove('show');
    });
    document.getElementById('styleFontMono').addEventListener('click', () => {
        resetStyles();
        body.style.fontFamily = "'Courier New', monospace";
        dropdown.classList.remove('show');
    });
    document.getElementById('styleRotate').addEventListener('click', () => {
        resetStyles();
        body.classList.add('effect-rotate');
        dropdown.classList.remove('show');
    });
    document.getElementById('styleInvert').addEventListener('click', () => {
        resetStyles();
        body.classList.add('effect-invert');
        dropdown.classList.remove('show');
    });
    document.getElementById('styleCrazy').addEventListener('click', () => {
        resetStyles();
        body.classList.add('effect-zoom', 'effect-blur');
        dropdown.classList.remove('show');
    });

    // Inizializza tutto
    function init() {
        renderDragArea();
        setupDropZones();
    }
    init();
</script>
</body>
</html>
